name: Generate Profile Summary Cards

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate profile summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN || github.token }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: main
          AUTO_PUSH: false

      - name: Customize profile details title
        shell: pwsh
        run: |
          $path = "profile-summary-card-output/github_dark/0-profile-details.svg"
          if (Test-Path $path) {
            $content = Get-Content $path -Raw
            $content = $content -replace '<text x="30" y="40" style="font-size: 22px; fill: #[^"]+;">[^<]+</text>', '<text x="30" y="40" style="font-size: 22px; font-weight: 700; letter-spacing: 0.3px; fill: #45E6FF;">Rituparna Gogoi</text>'
            Set-Content $path $content -NoNewline
          }

      - name: Commit and push generated cards
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-summary-card-output
          if git diff --cached --quiet; then
            echo "No profile card changes to commit."
            exit 0
          fi
          git commit -m "Update profile summary cards"
          git push
